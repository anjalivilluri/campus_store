{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">
        Add New Product
    </h2>

     <form method="POST" enctype="multipart/form-data">

        <input
        type="text"
        name="name"
        class="form-control mb-3"
        placeholder="Product Name"
        required>

        <input
        type="text"
        name="category"
        class="form-control mb-3"
        placeholder="Category"
        required>

        <input
        type="number"
        step="0.01"
        name="price"
        class="form-control mb-3"
        placeholder="Price"
        required>

        <textarea
        name="description"
        class="form-control mb-3"
        placeholder="Description"></textarea>

        <input
        type="number"
        name="stock"
        class="form-control mb-3"
        placeholder="Stock Quantity"
        required>
        <input
        type="file"
        name="image"
        class="form-control mb-3">

        <button
        type="submit"
        class="btn btn-success">

            Save Product

        </button>

    </form>

</div>

{% endblock %}
