{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2>Register</h2>

<form method="POST">

<input
name="fullname"
class="form-control mb-3"
type="text"
placeholder="Full Name"
required>

<input
name="email"
class="form-control mb-3"
type="email"
placeholder="Email"
required>

<input
name="password"
class="form-control mb-3"
type="password"
placeholder="Password"
required>

<button class="btn btn-success">
Register
</button>

</form>

</div>

{% endblock %}
