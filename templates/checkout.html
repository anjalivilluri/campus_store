{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2>Checkout</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Full Name</label>
            <input
            type="text"
            name="fullname"
            class="form-control"
            required>
        </div>

        <div class="mb-3">
            <label>Address</label>
            <textarea
            name="address"
            class="form-control"
            required></textarea>
        </div>

        <button
        type="submit"
        class="btn btn-success">

            Place Order

        </button>

    </form>

</div>

{% endblock %}
