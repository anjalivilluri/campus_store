{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2>My Orders</h2>

    <table class="table table-bordered">

        <tr>
            <th>Order ID</th>
            <th>Total</th>
            <th>Date</th>
        </tr>

        {% for order in orders %}

        <tr>

            <td>{{ order[0] }}</td>

            <td>₹{{ order[2] }}</td>

            <td>{{ order[3] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
