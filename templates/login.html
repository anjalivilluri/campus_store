{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2>Login</h2>

<form method="POST">

    <input
        type="email"
        name="email"
        class="form-control"
        placeholder="Email"
        required>

    <br>

    <input
        type="password"
        name="password"
        class="form-control"
        placeholder="Password"
        required>

    <br>

    <button type="submit" class="btn btn-primary">
        Login
    </button>

</form>

</div>

{% endblock %}
