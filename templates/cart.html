{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">
        Your Cart
    </h2>

    <table class="table table-bordered table-striped">

        <thead>

            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
            </tr>

        </thead>

        <tbody>

            {% for item in items %}

            <tr>

                <td>{{ item[0] }}</td>

                <td>₹{{ item[1] }}</td>

                <td>{{ item[2] }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

    <div class="mt-3">

        <a href="/products"
           class="btn btn-secondary">

            Continue Shopping

        </a>

        <a href="/checkout"
           class="btn btn-success">

            Proceed To Checkout

        </a>

    </div>

</div>

{% endblock %}
